<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KILLSAY - Minecraft 击杀喊话脚本</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background: #1A1D22;
        overflow: hidden;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1A1D22;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      
      .loading-bars {
        display: flex;
        align-items: center;
        gap: 4px;
        height: 40px;
      }
      
      .bar-left, .bar-right {
        display: flex;
        gap: 4px;
      }
      
      .bar {
        width: 4px;
        background: #F9D342;
        border-radius: 2px;
        animation: barPulse 1.2s ease-in-out infinite;
      }
      
      .bar-left .bar {
        animation-name: slideFromLeft;
      }
      
      .bar-right .bar {
        animation-name: slideFromRight;
      }
      
      .bar-left .bar:nth-child(1) { height: 16px; animation-delay: 0s; }
      .bar-left .bar:nth-child(2) { height: 24px; animation-delay: 0.1s; }
      .bar-left .bar:nth-child(3) { height: 32px; animation-delay: 0.2s; }
      .bar-left .bar:nth-child(4) { height: 40px; animation-delay: 0.3s; }
      
      .bar-right .bar:nth-child(1) { height: 40px; animation-delay: 0.3s; }
      .bar-right .bar:nth-child(2) { height: 32px; animation-delay: 0.2s; }
      .bar-right .bar:nth-child(3) { height: 24px; animation-delay: 0.1s; }
      .bar-right .bar:nth-child(4) { height: 16px; animation-delay: 0s; }
      
      .center-dot {
        width: 8px;
        height: 8px;
        background: #F9D342;
        border-radius: 50%;
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      
      @keyframes slideFromLeft {
        0%, 100% {
          transform: translateX(-20px);
          opacity: 0;
        }
        50% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes slideFromRight {
        0%, 100% {
          transform: translateX(20px);
          opacity: 0;
        }
        50% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes dotPulse {
        0%, 100% {
          transform: scale(0.5);
          opacity: 0.3;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
      }
      
      .loading-text {
        font-family: "Microsoft YaHei", "Inter", sans-serif;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      
      .loading-logo {
        font-family: "JetBrains Mono", "Consolas", monospace;
        font-size: 24px;
        font-weight: 700;
        color: #F9D342;
        letter-spacing: 6px;
      }
    </style>
  </head>
  <body>
    <div id="loading" class="loading-screen">
      <div class="loading-content">
        <div class="loading-logo">KILLSAY</div>
        <div class="loading-bars">
          <div class="bar-left">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          <div class="center-dot"></div>
          <div class="bar-right">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </div>
        <div class="loading-text">Loading...</div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide loading screen after app mounts
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.classList.add('fade-out');
            setTimeout(() => loading.remove(), 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
